name: Build iPhone-VCAM arm64 & DEB

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 列出根目录文件，核对子文件夹名称
      - name: List root files
        run: |
          pwd
          ls -la

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # 安装 dpkg 打包工具
      - name: Install dpkg
        run: |
          brew update
          brew install dpkg

      # 进入项目子目录编译（重点：cd 到项目文件夹） # 替换为你的真实子文件夹名，这里示例为 iPhone-VCAM
      - name: Xcode Build arm64 Release
        run: |
          pwd
          ls -la
          
          xcodebuild clean build \
            -project "./" \
            -scheme "iPhone-VCAM" \
            -configuration Release \
            -sdk iphoneos \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="./Build"

      # 回到根目录，处理 DEB 打包
      - name: Prepare DEB structure
        run: |
          mkdir -p deb_tmp/Applications deb_tmp/DEBIAN
          # 从子目录找到编译出的 app
          APP_FILE=$(find ./iPhone-VCAM/Build/Products/Release-iphoneos -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [ ! -d "$APP_FILE" ]; then
            echo "ERROR: .app not found"
            exit 1
          fi
          cp -R "$APP_FILE" deb_tmp/Applications/
          find deb_tmp -name ".DS_Store" -delete
          
          TAG_VERSION=${{ github.event.release.tag_name }}
          echo "Package: com.wordgege.vcam" > deb_tmp/DEBIAN/control
          echo "Name: iPhone-VCAM" >> deb_tmp/DEBIAN/control
          echo "Version: ${TAG_VERSION}" >> deb_tmp/DEBIAN/control
          echo "Architecture: iphoneos-arm64" >> deb_tmp/DEBIAN/control
          echo "Section: System" >> deb_tmp/DEBIAN/control
          echo "Priority: optional" >> deb_tmp/DEBIAN/control
          echo "Maintainer: wordgege" >> deb_tmp/DEBIAN/control
          echo "Description: iPhone Virtual Camera arm64" >> deb_tmp/DEBIAN/control
          echo "Depends: firmware (>= 14.0)" >> deb_tmp/DEBIAN/control

      - name: Build .deb package
        run: |
          dpkg-deb -b deb_tmp iPhone-VCAM_arm64.deb

      - name: Upload to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: iPhone-VCAM_arm64.deb
        env:
          GITHUB_TOKEN: ${{secrets.TOKEN_GITHUB}}
