name: Build iPhone-VCAM (Theos) arm64 DEB
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Xcode 命令行工具 & 基础依赖
      - name: Install base dependencies
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          sudo xcode-select --install || true
          brew update
          brew install perl dpkg ldid coreutils

      # 完整安装并初始化 Theos
      - name: Setup Theos
        run: |
          rm -rf ~/theos
          git clone --depth 1 https://github.com/theos/theos.git ~/theos
          cd ~/theos
          # 执行官方初始化脚本
          ./install.sh
          # 写入全局环境变量，全步骤生效
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$HOME/theos/vendor/bin:$PATH" >> $GITHUB_ENV

      # 编译打包 仅 arm64
      - name: Build & Package
        run: |
          make clean
          make package ARCHS=arm64

      # 重命名 DEB
      - name: Rename package
        run: |
          TAG_VER=${{ github.event.release.tag_name }}
          find ./packages -maxdepth 1 -name "*.deb" -exec mv {} ./iPhone-VCAM_${TAG_VER}_arm64.deb \;

      # 上传到 Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: iPhone-VCAM_*_arm64.deb
        env:
          GITHUB_TOKEN: ${{secrets.TOKEN_GITHUB}}
