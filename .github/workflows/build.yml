name: Build iPhone-VCAM (Theos) arm64 DEB

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 安装系统依赖 & Xcode 命令行工具
      - name: Install system dependencies
        run: |
          sudo xcode-select --install || true
          brew update
          brew install perl dpkg ldid

      # 2. 安装 Theos
      - name: Install Theos toolchain
        run: |
          git clone --depth 1 https://github.com/theos/theos.git ~/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      # 3. 编译 + 打包，指定 arm64
      - name: Build and package
        run: |
          make clean
          make package ARCHS=arm64

      # 4. 重命名安装包
      - name: Rename deb file
        run: |
          TAG_VER=${{ github.event.release.tag_name }}
          find ./packages -name "*.deb" -exec mv {} ./iPhone-VCAM_${TAG_VER}_arm64.deb \;

      # 5. 上传到 Release 附件
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: iPhone-VCAM_*_arm64.deb
        env:
          GITHUB_TOKEN: ${{secrets.TOKEN_GITHUB}}
