name: Build iPhone-VCAM arm64 & DEB

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 打印当前目录、列出文件，方便排错
      - name: Check project files
        run: |
          pwd
          ls -la

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dpkg via Homebrew
        run: |
          brew update
          brew install dpkg

      # 安装 CocoaPods 并执行 pod install
      - name: Install CocoaPods & Dependencies
        run: |
          sudo gem install cocoapods
          # 校验 Podfile 是否存在
          if [ ! -f "Podfile" ]; then
            echo "ERROR: Podfile not found!"
            exit 1
          fi
          pod install --repo-update

      - name: Xcode Build arm64 Release
        run: |
          xcodebuild clean build \
            -workspace "iPhone-VCAM.xcworkspace" \
            -scheme "iPhone-VCAM" \
            -configuration Release \
            -sdk iphoneos \
            ARCHS=arm64 \
            VALID_ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="./Build"

      - name: Prepare DEB structure
        run: |
          mkdir -p deb_tmp/Applications deb_tmp/DEBIAN
          APP_FILE=$(find ./Build/Products/Release-iphoneos -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [ ! -d "$APP_FILE" ]; then
            echo "ERROR: .app not found"
            exit 1
          fi
          cp -R "$APP_FILE" deb_tmp/Applications/
          find deb_tmp -name ".DS_Store" -delete
          
          TAG_VERSION=${{ github.event.release.tag_name }}
          echo "Package: com.wordgege.vcam" > deb_tmp/DEBIAN/control
          echo "Name: iPhone-VCAM" >> deb_tmp/DEBIAN/control
          echo "Version: 0.1.1" >> deb_tmp/DEBIAN/control
          echo "Architecture: iphoneos-arm64" >> deb_tmp/DEBIAN/control
          echo "Section: System" >> deb_tmp/DEBIAN/control
          echo "Priority: optional" >> deb_tmp/DEBIAN/control
          echo "Maintainer: wordgege" >> deb_tmp/DEBIAN/control
          echo "Description: iPhone Virtual Camera arm64" >> deb_tmp/DEBIAN/control
          echo "Depends: firmware (>= 14.0)" >> deb_tmp/DEBIAN/control

      - name: Build .deb package
        run: |
          dpkg-deb -b deb_tmp iPhone-VCAM_arm64.deb

      - name: Upload to Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: iPhone-VCAM_arm64.deb
        env:
          GITHUB_TOKEN: ${{secrets.TOKEN_GITHUB}}
